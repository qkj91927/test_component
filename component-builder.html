        function buildTextBlockRow(variant) {
            const container = document.createElement('div');
            container.className = 'text-block-container';
            container.style.width = '428px';
            container.style.height = variant.containerHeight + 'px';

            if (variant.icon) {
                const icon = document.createElement('img');
                icon.className = 'text-block-icon ' + variant.iconAlign;
                icon.src = variant.icon;
                container.appendChild(icon);
            }

            const textDiv = document.createElement('div');
            textDiv.style.position = 'absolute';
            textDiv.style.width = variant.textWidth + 'px';
            textDiv.style.left = variant.textLeft + 'px';
            textDiv.style.top = variant.textTop + 'px';

            if (variant.textType === 'title') {
                textDiv.className = 'text-block-title ' + variant.textAlign;
            } else if (variant.textType === 'subtitle') {
                textDiv.className = 'text-block-subtitle';
            } else if (variant.textType === 'aux-title') {
                textDiv.className = 'text-block-aux-title';
            } else if (variant.textType === 'body') {
                textDiv.className = 'text-block-body';
                textDiv.style.display = 'inline-block';
                textDiv.style.verticalAlign = 'middle';
            } else if (variant.textType === 'link') {
                textDiv.className = 'text-block-link';
                textDiv.style.display = 'inline-block';
                textDiv.style.verticalAlign = 'middle';
            } else if (variant.textType === 'caption') {
                textDiv.className = 'text-block-caption';
                textDiv.style.display = 'inline-block';
                textDiv.style.verticalAlign = 'middle';
            }

            textDiv.innerHTML = variant.textContent;
            container.appendChild(textDiv);
            return container;
        }

        function createTextBlockPreview(variant) {
            const component = buildTextBlockRow(variant);
            return wrapForPreview(component, variant.containerHeight);
        }

        function wrapForPreview(component, height) {
            const wrapper = document.createElement('div');
            wrapper.style.width = '214px'; // 428 * 0.5
            wrapper.style.height = (height * 0.5) + 'px';
            wrapper.style.position = 'relative';
            wrapper.style.overflow = 'hidden';
            
            component.style.transform = 'scale(0.5)';
            component.style.transformOrigin = 'top left';
            component.style.position = 'absolute';
            component.style.top = '0';
            component.style.left = '0';
            
            wrapper.appendChild(component);
            return wrapper;
        }

        // ========== 拖拽功能 ==========
        let draggedVariant = null;
        let draggedCanvasComponent = null;
        let originalParent = null; // 记录拖拽前的父容器，用于清理空组

        function handleDragStart(e) {
            // 使用 currentTarget 确保获取绑定事件的元素（即 .variant-preview）
            const target = e.currentTarget;
            if (target.dataset.variant) {
                draggedVariant = JSON.parse(target.dataset.variant);
                e.dataTransfer.effectAllowed = 'copy';
                // 新组件拖拽不需要记录 originalParent
                originalParent = null;
            }
        }

        const dropZone = document.getElementById('dropZone');
        const dragIndicator = document.createElement('div');
        dragIndicator.className = 'drag-indicator';

        // 初始化主 Drop Zone
        setupDropZone(dropZone);

        // 初始化垃圾桶区域 (整个画布容器)
        setupTrashZone();

        function setupTrashZone() {
            const container = document.querySelector('.canvas-container');
            
            container.addEventListener('dragover', (e) => {
                // 如果正在拖拽画板内组件，且鼠标不在有效的 dropZone 内
                if (draggedCanvasComponent) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move'; 
                    // container.style.backgroundColor = 'rgba(255, 59, 48, 0.1)';
                }
            });

            container.addEventListener('dragleave', (e) => {
                if (e.relatedTarget && !container.contains(e.relatedTarget)) {
                    // container.style.backgroundColor = '';
                }
            });

            // 恢复背景色
            container.addEventListener('drop', (e) => {
                // container.style.backgroundColor = '';
                
                if (draggedCanvasComponent) {
                    e.preventDefault();
                    // 记录删除前的当前父容器
                    const currentParent = draggedCanvasComponent.parentNode;
                    
                    // 如果组件在模态层内，移除整个模态覆盖层（mask + 组件）
                    const modalOverlay = draggedCanvasComponent.closest('.modal-overlay');
                    if (modalOverlay) {
                        modalOverlay.remove();
                    } else {
                        // 删除组件
                        draggedCanvasComponent.remove();
                    }
                    
                    // 全局清理所有空组
                    cleanupAllEmptyGroups();
                    
                    draggedCanvasComponent = null;
                    originalParent = null;
                }
            });
        }

        // 全局清理所有空的 Form Group
        function cleanupAllEmptyGroups() {
            document.querySelectorAll('.form-group-content').forEach(content => {
                // 如果没有子元素 (排除 indicator, 虽然 drop 时 indicator 应该已被移除)
                // 注意：如果有 indicator，children.length 可能是 1。但我们只关心 .canvas-component
                const components = content.querySelectorAll('.canvas-component');
                if (components.length === 0) {
                    const group = content.closest('.form-group');
                    if (group) {
                        group.remove();
                    }
                }
            });
        }

        // 旧函数兼容 (虽然后面不再使用 checkAndRemoveEmptyGroup，但为了防止报错先保留或移除)
        // 这里直接用 cleanupAllEmptyGroups 替换

        // 通用 Drop Zone 设置函数 (支持嵌套)
        function setupDropZone(container) {
            container.addEventListener('dragover', (e) => {
                // 必须阻止冒泡，否则会触发 trashZone 的事件
                e.stopPropagation(); 
                e.preventDefault();

                container.classList.add('drag-over');

                // 模态层检查：当 phone-frame 上已有模态覆盖层时，底层 drop-zone 不再接受新组件
                // 但半屏浮层模态允许非模态组件拖入其内容区域
                if (draggedVariant && !container.closest('.modal-overlay')) {
                    const phoneFrame = container.closest('.phone-frame');
                    if (phoneFrame && phoneFrame.querySelector('.modal-overlay')) {
                        const modalOverlay = phoneFrame.querySelector('.modal-overlay');
                        const hsDropContent = modalOverlay.querySelector('.hs-overlay-drop-content');
                        if (hsDropContent && !draggedVariant.isModal) {
                            // 半屏浮层允许接收非模态组件 — 重定向到半屏内容区
                            e.dataTransfer.dropEffect = 'copy';
                            dragIndicator.style.display = 'block';
                            hsDropContent.appendChild(dragIndicator);
                        } else {
                            e.dataTransfer.dropEffect = 'none';
                            if (dragIndicator.parentNode === container) {
                                container.removeChild(dragIndicator);
                            }
                        }
                        return;
                    }
                }

                // 约束检查：嵌套区域只接受 Form 类型
                if (container.classList.contains('nested-drop-zone')) {
                    if (draggedVariant && draggedVariant.type !== 'form') {
                        e.dataTransfer.dropEffect = 'none';
                        if (dragIndicator.parentNode === container) {
                            container.removeChild(dragIndicator);
                        }
                        return;
                    }
                }

                const afterElement = getDragAfterElement(container, e.clientY);
                
                if (draggedVariant) {
                    e.dataTransfer.dropEffect = 'copy';
                    dragIndicator.style.display = 'block';
                    if (afterElement) {
                        container.insertBefore(dragIndicator, afterElement);
                    } else {
                        container.appendChild(dragIndicator);
                    }
                } else if (draggedCanvasComponent) {
                    e.dataTransfer.dropEffect = 'move'; // 明确设置为 move
                    if (afterElement) {
                        container.insertBefore(draggedCanvasComponent, afterElement);
                    } else {
                        container.appendChild(draggedCanvasComponent);
                    }
                }
            });

            container.addEventListener('dragleave', (e) => {
                // 同样阻止冒泡
                e.stopPropagation();

                if (e.relatedTarget && !container.contains(e.relatedTarget) && e.relatedTarget !== container) {
                    container.classList.remove('drag-over');
                    if (draggedVariant && dragIndicator.parentNode === container) {
                        container.removeChild(dragIndicator);
                    }
                }
            });

            container.addEventListener('drop', (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                container.classList.remove('drag-over', 'empty');
                
                // 移除空白引导提示
                const guide = container.querySelector('.empty-guide');
                if (guide) guide.remove();
                
                if (draggedVariant) {
                    // 模态层检查：底层 drop-zone 在模态覆盖时，半屏浮层重定向到内容区
                    if (!container.closest('.modal-overlay')) {
                        const phoneFrame = container.closest('.phone-frame');
                        if (phoneFrame && phoneFrame.querySelector('.modal-overlay')) {
                            const modalOverlay = phoneFrame.querySelector('.modal-overlay');
                            const hsDropContent = modalOverlay.querySelector('.hs-overlay-drop-content');
                            if (hsDropContent && !draggedVariant.isModal) {
                                // 将组件放入半屏浮层内容区
                                const wrapper = createComponentWrapper(draggedVariant);
                                if (dragIndicator.parentNode === hsDropContent) {
                                    hsDropContent.replaceChild(wrapper, dragIndicator);
                                } else {
                                    hsDropContent.appendChild(wrapper);
                                }
                                draggedVariant = null;
                                if (dragIndicator.parentNode) dragIndicator.parentNode.removeChild(dragIndicator);
                                return;
                            }
                            draggedVariant = null;
                            if (dragIndicator.parentNode) dragIndicator.parentNode.removeChild(dragIndicator);
                            return;
                        }
                    }

                    if (container.classList.contains('nested-drop-zone') && draggedVariant.type !== 'form') {
                        return;
                    }

                    const wrapper = createComponentWrapper(draggedVariant);
                    
                    // 如果是 navbar 组件，提升到固定导航栏区域
                    if (draggedVariant.type === 'navbar') {
                        const phoneFrame = container.closest('.phone-frame');
                        if (phoneFrame) {
                            const navbarFixed = phoneFrame.querySelector('.phone-navbar-fixed');
                            if (navbarFixed) {
                                navbarFixed.innerHTML = '';
                                navbarFixed.appendChild(wrapper);
                                draggedVariant = null;
                                if (dragIndicator.parentNode) {
                                    dragIndicator.parentNode.removeChild(dragIndicator);
                                }
                                return;
                            }
                        }
                    }

                    // ===== 菜单（popover）组件处理：自由定位 =====
                    if (draggedVariant.type === 'menu') {
                        const phoneFrame = container.closest('.phone-frame');
                        if (phoneFrame) {
                            const frameRect = phoneFrame.getBoundingClientRect();
                            const scaleRatio = frameRect.width / 428;
                            let dropX = (e.clientX - frameRect.left) / scaleRatio;
                            let dropY = (e.clientY - frameRect.top) / scaleRatio;

                            const menuW = 180;
                            const menuH = draggedVariant.optionCount * 52;
                            dropX = Math.max(0, Math.min(dropX, 428 - menuW));
                            dropY = Math.max(0, Math.min(dropY, 926 - menuH));

                            wrapper.style.position = 'absolute';
                            wrapper.style.left = dropX + 'px';
                            wrapper.style.top = dropY + 'px';
                            wrapper.style.width = menuW + 'px';
                            wrapper.style.zIndex = '200';
                            wrapper.style.cursor = 'move';

                            let isDraggingMenu = false;
                            let menuOffsetX = 0, menuOffsetY = 0;
                            // 获取 frames-wrapper 的 deviceScale 缩放比
                            const deviceScale = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--device-scale')) || 1;

                            wrapper.setAttribute('draggable', 'false');
                            wrapper.addEventListener('mousedown', (me) => {
                                me.stopPropagation();
                                me.preventDefault();
                                isDraggingMenu = true;
                                const wrapRect = wrapper.getBoundingClientRect();
                                menuOffsetX = me.clientX - wrapRect.left;
                                menuOffsetY = me.clientY - wrapRect.top;
                                wrapper.style.transition = 'none';
                                // 将菜单临时改为fixed定位，避免修改phone-frame的overflow导致圆角消失
                                const wrapRect2 = wrapper.getBoundingClientRect();
                                // 记录原始在phone-frame中的位置
                                wrapper._origParent = wrapper.parentElement;
                                // 改为fixed定位，并应用 deviceScale 缩放以保持视觉尺寸一致
                                wrapper.style.position = 'fixed';
                                wrapper.style.left = wrapRect2.left + 'px';
                                wrapper.style.top = wrapRect2.top + 'px';
                                wrapper.style.width = menuW + 'px';
                                wrapper.style.transform = `scale(${deviceScale})`;
                                wrapper.style.transformOrigin = 'top left';
                                wrapper.style.zIndex = '99999';
                                document.body.appendChild(wrapper);
                            });

                            const onMouseMove = (me) => {
                                if (!isDraggingMenu) return;
                                let nx = me.clientX - menuOffsetX;
                                let ny = me.clientY - menuOffsetY;
                                wrapper.style.left = nx + 'px';
                                wrapper.style.top = ny + 'px';
                            };

                            const onMouseUp = (me) => {
                                if (!isDraggingMenu) return;
                                isDraggingMenu = false;

                                const fRect = phoneFrame.getBoundingClientRect();
                                const cx = me.clientX;
                                const cy = me.clientY;
                                const tolerance = 10;
                                if (cx < fRect.left - tolerance || cx > fRect.right + tolerance ||
                                    cy < fRect.top - tolerance || cy > fRect.bottom + tolerance) {
                                    wrapper.style.transition = 'opacity 0.15s, transform 0.15s';
                                    wrapper.style.opacity = '0';
                                    wrapper.style.transform = `scale(${deviceScale * 0.8})`;
                                    setTimeout(() => {
                                        wrapper.remove();
                                        document.removeEventListener('mousemove', onMouseMove);
                                        document.removeEventListener('mouseup', onMouseUp);
                                    }, 150);
                                    return;
                                }

                                // 将菜单移回phone-frame
                                const s = fRect.width / 428;
                                let fx = (me.clientX - fRect.left - menuOffsetX) / s;
                                let fy = (me.clientY - fRect.top - menuOffsetY) / s;
                                fx = Math.max(0, Math.min(fx, 428 - menuW));
                                fy = Math.max(0, Math.min(fy, 926 - menuH));
                                phoneFrame.appendChild(wrapper);
                                wrapper.style.position = 'absolute';
                                wrapper.style.left = fx + 'px';
                                wrapper.style.top = fy + 'px';
                                wrapper.style.width = menuW + 'px';
                                wrapper.style.transform = '';
                                wrapper.style.transformOrigin = '';
                                wrapper.style.zIndex = '200';
                            };

                            document.addEventListener('mousemove', onMouseMove);
                            document.addEventListener('mouseup', onMouseUp);

                            wrapper.addEventListener('dblclick', () => {
                                wrapper.remove();
                                document.removeEventListener('mousemove', onMouseMove);
                                document.removeEventListener('mouseup', onMouseUp);
                            });

                            phoneFrame.appendChild(wrapper);

                            draggedVariant = null;
                            if (dragIndicator.parentNode) {
                                dragIndicator.parentNode.removeChild(dragIndicator);
                            }
                            return;
                        }
                    }

                    // ===== 模态组件处理（ActionSheet / Dialog 等）=====
                    if (draggedVariant.isModal || draggedVariant.type === 'action_sheet') {
                        const phoneFrame = container.closest('.phone-frame');
                        if (phoneFrame) {
                            // 移除已有模态覆盖层
                            const existingOverlay = phoneFrame.querySelector('.modal-overlay');
                            if (existingOverlay) existingOverlay.remove();

                            // 创建模态覆盖层
                            const overlay = document.createElement('div');
                            overlay.className = 'modal-overlay';
                            // Dialog 居中，ActionSheet 底部对齐
                            if (draggedVariant.type === 'dialog') {
                                overlay.style.justifyContent = 'center';
                                overlay.style.alignItems = 'center';
                            }

                            const mask = document.createElement('div');
                            mask.className = 'modal-mask';
                            overlay.appendChild(mask);

                            const contentArea = document.createElement('div');
                            contentArea.className = 'modal-content-area';
                            // Dialog 需要限制宽度并居中
                            if (draggedVariant.type === 'dialog') {
                                contentArea.style.width = '80%';
                                contentArea.style.maxWidth = '296px';
                            }
                            contentArea.appendChild(wrapper);
                            overlay.appendChild(contentArea);

                            phoneFrame.appendChild(overlay);

                            // mask 双击移除整个模态层
                            mask.addEventListener('dblclick', () => {
                                overlay.remove();
                            });

                            draggedVariant = null;
                            if (dragIndicator.parentNode) {
                                dragIndicator.parentNode.removeChild(dragIndicator);
                            }
                            return;
                        }
                    }
                    
                    if (dragIndicator.parentNode === container) {
                        container.replaceChild(wrapper, dragIndicator);
                    } else {
                        container.appendChild(wrapper);
                    }

                    // A3 半屏导航栏特殊处理：如果下一个兄弟是 image_block，叠在图片上不占高度
                    applyHsNavbarA3Overlay(wrapper);

                    draggedVariant = null;
                } else if (draggedCanvasComponent) {
                    // 移动发生后，全局检查是否有组变空
                    cleanupAllEmptyGroups();
                    draggedCanvasComponent = null;
                    originalParent = null;
                }
                
                if (dragIndicator.parentNode) {
                    dragIndicator.parentNode.removeChild(dragIndicator);
                }
            });
        }

        function createComponentWrapper(variant) {
            const wrapper = document.createElement('div');

            } else if (variant.type === 'data_filter') {

            } else if (variant.type === 'search') {

            } else if (variant.type === 'textfield') {

            } else if (variant.type === 'dialog') {
                component = createFullDialogComponent(variant);
            } else if (variant.type === 'menu') {

                component = createFullHalfScreenOverlayComponent(variant);

            }
            wrapper.appendChild(component);
            
            // 拖拽排序事件
            wrapper.addEventListener('dragstart', handleCanvasDragStart);
            wrapper.addEventListener('dragover', handleCanvasDragOver);
            wrapper.addEventListener('drop', handleCanvasDrop);
            wrapper.addEventListener('dragend', handleCanvasDragEnd);
            
            // 启用文本双击编辑

        function addComponentToCanvas(variant, afterElement = null) {
            const wrapper = createComponentWrapper(variant);

        // 画板内组件拖拽排序

        function handleCanvasDragStart(e) {
            // 在事件委托到 wrapper 时捕获
            draggedCanvasComponent = e.currentTarget;
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            
            // 记录拖拽前的父容器
            originalParent = draggedCanvasComponent.parentNode;
        }

        function handleCanvasDragOver(e) {
            // 所有拖拽事件委托给容器 (dropZone 或 form-group-content) 处理
            // 这样可以统一处理嵌套和非嵌套的情况
            return;
        }

        function handleCanvasDrop(e) {
            // 同样委托给容器处理
            return;
        }

        function handleCanvasDragEnd(e) {
            e.currentTarget.classList.remove('dragging');
            draggedCanvasComponent = null;
        }

        function getDragAfterElement(container, y) {
            // 关键修改：只查找直接子元素，避免获取到嵌套组件内部的元素
            // 使用 Array.from 转换 HTMLCollection
            const draggableElements = Array.from(container.children).filter(child => {
                return child.classList.contains('canvas-component') && !child.classList.contains('dragging');
            });
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // 双击启用文本编辑功能
        function enableDoubleClickEdit(wrapper) {
            const selectors = [
                '[style*="font-size"]', 
                '.title', '.subtitle', '.helper-text', 
                '.combo-title', '.combo-desc',
                '.nav-title', '.nav-subtitle', '.nav-text', '.nav-btn', 
                '.amount', '.nav-badge-neutral', '.nav-segment-item', 
                '.desc', '.text-link', '.nav-profile-name'
            ];
            const textElements = wrapper.querySelectorAll(selectors.join(', '));
            
            textElements.forEach(el => {
                // 跳过图标、图片和按钮
                if (el.tagName === 'IMG' || el.querySelector('img') || el.classList.contains('form-switch')) return;
                
                const text = el.textContent.trim();
                if (text && text.length > 0 && text.length < 100) {
                    el.classList.add('editable-text');
                    
                    el.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        this.contentEditable = 'true';
                        this.focus();
                        
                        // 选中所有文本
                        const range = document.createRange();
                        range.selectNodeContents(this);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                    });
                    
                    el.addEventListener('blur', function() {
                        this.contentEditable = 'false';
                    });
                    
                    el.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.blur();
                        }
                        if (e.key === 'Escape') {
                            this.blur();
                        }
                    });
                }
            });
        }

        // ========== Button 按钮 Preview & Full Component ==========
        function buildButtonElement(variant, stateKey, interactive) {
            if (interactive === undefined) interactive = true;
            const btn = document.createElement('div');
            const sizeStyles = {
                large:  'width: 320px; height: 48px; border-radius: 14px; font-size: 17px; font-weight: 500;',
                medium: 'width: 169px; height: 40px; border-radius: 12px; font-size: 17px; font-weight: 500;',
                small:  'min-width: 60px; height: 32px; border-radius: 16px; font-size: 14px; font-weight: 400; padding: 0 16px;',
                mini:   'min-width: 42px; height: 24px; border-radius: 12px; font-size: 10px; font-weight: 400; padding: 0 11px;'
            };
            const typeStateStyles = {
                primary: {
                    default:  'background: #0099FF; color: white;',
                    pressed:  'background: #008AE5; color: white;',
                    loading:  'background: #008AE5; color: white;',
                    disabled: 'background: rgba(0,153,255,0.50); color: rgba(255,255,255,0.50); cursor: not-allowed;'
                },
                secondary: {
                    default:  'background: transparent; border: 1px solid rgba(60,60,67,0.25); color: rgba(0,0,0,0.90);',
                    pressed:  'background: rgba(204,204,204,0.30); border: 1px solid rgba(60,60,67,0.25); color: rgba(0,0,0,0.90);',
                    loading:  'background: rgba(204,204,204,0.30); border: 1px solid rgba(60,60,67,0.25); color: rgba(0,0,0,0.90);',
                    disabled: 'background: rgba(204,204,204,0.30); border: 1px solid rgba(60,60,67,0.12); color: rgba(0,0,0,0.30); opacity: 0.30; cursor: not-allowed;'
                },
                error: {
                    default:  'background: transparent; border: 1px solid rgba(60,60,67,0.25); color: #F74C30;',
                    pressed:  'background: rgba(204,204,204,0.30); border: 1px solid rgba(60,60,67,0.25); color: #F74C30;',
                    disabled: 'background: transparent; border: 1px solid rgba(60,60,67,0.12); color: rgba(247,76,48,0.30); cursor: not-allowed;'
                }
            };

            const baseStyle = 'display: flex; align-items: center; justify-content: center; font-family: PingFang SC, -apple-system, sans-serif; box-sizing: border-box; white-space: nowrap; cursor: pointer; user-select: none; transition: all 0.15s ease;';
            const style = baseStyle + (sizeStyles[variant.sizeKey] || '') + (typeStateStyles[variant.typeKey]?.[stateKey] || '');
            btn.setAttribute('style', style);

            const labels = (variant.sizeKey === 'small' || variant.sizeKey === 'mini')
                ? { default: '默认', pressed: '按下', loading: '加载', disabled: '不可' }
                : { default: '默认态', pressed: '按下态', loading: '加载态', disabled: '不可点击' };

            // spinner 渐变圆环生成（还原 Figma 设计稿）
            function getSpinnerInline() {
                const color = variant.typeKey === 'primary' ? '255,255,255' : '0,0,0';
                const op = variant.typeKey === 'primary' ? '0.90' : '0.40';
                const uid = variant.typeKey + '_' + Math.random().toString(36).slice(2,6);
                return `<svg style="width:19px;height:19px;margin-right:4px;animation:btn-spin 1s linear infinite;" width="19" height="19" viewBox="0 0 19 19" fill="none"><defs><linearGradient id="sgA${uid}" x1="9.5" y1="0" x2="9.5" y2="9.5" gradientUnits="userSpaceOnUse"><stop stop-color="rgba(${color},${op})"/><stop offset="1" stop-color="rgba(${color},${op})" stop-opacity="0.6"/></linearGradient><linearGradient id="sgB${uid}" x1="9.5" y1="19" x2="9.5" y2="9.5" gradientUnits="userSpaceOnUse"><stop stop-color="rgba(${color},0.05)"/><stop offset="1" stop-color="rgba(${color},${op})" stop-opacity="0.3"/></linearGradient></defs><path d="M9.5 1C5.08 1 1.5 4.58 1.5 9s3.58 8.5 8 8.5" stroke="url(#sgA${uid})" stroke-width="2" stroke-linecap="round"/><path d="M9.5 18C13.92 18 17.5 14.42 17.5 10s-3.58-8.5-8-8.5" stroke="url(#sgB${uid})" stroke-width="2" stroke-linecap="round"/></svg>`;
            }

            if (stateKey === 'loading') {
                btn.innerHTML = getSpinnerInline() + `<span>${labels[stateKey]}</span>`;
            } else {
                btn.textContent = labels[stateKey];
            }

            // mousedown→按下态，mouseup→(加载→)默认，模拟真实按钮交互（仅画布中启用）
            if (interactive && stateKey !== 'disabled') {
                let isAnimating = false;
                const hasLoading = variant.states.includes('loading');

                function applyBtnState(el, state) {
                    const newStyle = baseStyle + (sizeStyles[variant.sizeKey] || '') + (typeStateStyles[variant.typeKey]?.[state] || '');
                    el.setAttribute('style', newStyle);
                    if (state === 'loading') {
                        el.innerHTML = getSpinnerInline() + `<span>${labels[state]}</span>`;
                    } else {
                        el.textContent = labels[state];
                    }
                }

                let isPressed = false;
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    if (isAnimating) return;
                    isPressed = true;
                    applyBtnState(btn, 'pressed');
                });
                const handleRelease = () => {
                    if (!isPressed || isAnimating) return;
                    isPressed = false;
                    isAnimating = true;
                    if (hasLoading) {
                        applyBtnState(btn, 'loading');
                        setTimeout(() => {
                            applyBtnState(btn, 'default');
                            isAnimating = false;
                        }, 800);
                    } else {
                        applyBtnState(btn, 'default');
                        isAnimating = false;
                    }
                };
                btn.addEventListener('mouseup', handleRelease);
                btn.addEventListener('mouseleave', () => {
                    if (isPressed && !isAnimating) {
                        isPressed = false;
                        applyBtnState(btn, 'default');
                    }
                });
            }

            return btn;
        }

            // 可视化展示层
            const display = document.createElement('div');
            display.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;z-index:1;pointer-events:none;padding:0 10px;box-sizing:border-box;';

            cancelBtn.textContent = '取消';
            container.appendChild(cancelBtn);

            function updateSearchDisplay() {
                const val = hiddenInput.value;
                const focused = document.activeElement === hiddenInput;
                const hasVal = val.length > 0;

                // 取消按钮显示逻辑：focused 或有值时显示
                cancelBtn.style.display = (focused || hasVal) ? 'block' : 'none';

                // 输入框内居中/左对齐
                if (!focused && !hasVal) {
                    // 默认态 - 居中
                    searchBox.style.justifyContent = 'center';
                    searchBox.style.padding = '0';
                    display.style.justifyContent = 'center';
                    display.style.padding = '0';

                        <span style="font-size:17px;font-weight:400;color:rgba(60,60,67,0.56);">搜索</span>
                    </div>`;
                } else if (focused && !hasVal) {
                    // 激活态 - 左对齐+光标
                    searchBox.style.justifyContent = '';
                    searchBox.style.padding = '0 10px';
                    display.style.justifyContent = '';
                    display.style.padding = '0 10px';
                    display.innerHTML = `<div style="display:flex;align-items:center;gap:4px;">
                        <span style="display:flex;align-items:center;">${SEARCH_SVG.iconSecondary}</span>
                        <span style="display:flex;align-items:center;">${SEARCH_SVG.cursor}</span>
                        <span style="font-size:17px;font-weight:400;color:rgba(60,60,67,0.56);">搜索</span>
                    </div>`;
                } else if (focused && hasVal) {
                    // 输入态 - 左对齐+文字+光标+清除
                    searchBox.style.justifyContent = '';
                    searchBox.style.padding = '0 10px';
                    display.style.justifyContent = '';
                    display.style.padding = '0 10px';
                    display.innerHTML = `<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
                        <span style="display:flex;align-items:center;flex-shrink:0;">${SEARCH_SVG.iconPrimary}</span>
                        <span style="font-size:17px;font-weight:400;color:rgba(0,0,0,0.90);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${val}</span>
                        <span style="display:flex;align-items:center;">${SEARCH_SVG.cursor}</span>
                    </div>
                    <div style="display:flex;align-items:center;flex-shrink:0;margin-left:auto;padding-left:8px;pointer-events:auto;cursor:pointer;" data-search-clear="1">
                        ${SEARCH_SVG.clear}
                    </div>`;
                } else {
                    // 有值但不聚焦 - 左对齐+文字
                    searchBox.style.justifyContent = '';
                    searchBox.style.padding = '0 10px';
                    display.style.justifyContent = '';
                    display.style.padding = '0 10px';
                    display.innerHTML = `<div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0;">
                        <span style="display:flex;align-items:center;flex-shrink:0;">${SEARCH_SVG.iconPrimary}</span>
                        <span style="font-size:17px;font-weight:400;color:rgba(0,0,0,0.90);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${val}</span>
                    </div>`;
                }
            }

            hiddenInput.addEventListener('focus', updateSearchDisplay);
            hiddenInput.addEventListener('blur', updateSearchDisplay);
            hiddenInput.addEventListener('input', updateSearchDisplay);

            // 清除按钮
            searchBox.addEventListener('mousedown', (e) => {
                if (e.target.closest('[data-search-clear]')) {
                    e.preventDefault();
                    e.stopPropagation();
                    hiddenInput.value = '';
                    hiddenInput.focus();
                    setTimeout(updateSearchDisplay, 0);
                }
            });

            // 取消按钮
            cancelBtn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                hiddenInput.value = '';
                hiddenInput.blur();
                setTimeout(updateSearchDisplay, 0);
            });

            // 初始渲染
            updateSearchDisplay();

            container.style.width = '100%';
            return container;

        function generateTextFieldVariants() {
            const types = [
                { key: 'A', label: '单行无标题', tfType: 'single_no_title' },
                { key: 'B', label: '单行有标题', tfType: 'single_with_title' },
                { key: 'C', label: '电话号码', tfType: 'phone' },
                { key: 'D', label: '多行文本', tfType: 'multiline' }
            ];
            const states = [
                { key: '1', label: '默认态', state: 'default' },
                { key: '2', label: '激活态', state: 'focused' },
                { key: '3', label: '输入态', state: 'typing' },
                { key: '4', label: '完成态', state: 'completed' },
                { key: '5', label: '错误态', state: 'error' }
            ];
            const variants = [];
            types.forEach(t => {
                states.forEach(s => {
                    variants.push({
                        id: t.key + s.key,
                        group: t.key + '.' + t.label,
                        name: t.label + ' · ' + s.label,
                        type: 'textfield',
                        tfType: t.tfType,
                        state: s.state
                    });
                });
            });
            return variants;
        }

        function renderTextFieldVariants() {
            const variants = generateTextFieldVariants();
            const container = document.getElementById('variantList');
            
            document.getElementById('variantTitle').textContent = '输入框';
            document.getElementById('variantCount').textContent = `${variants.length} 个变体（4种类型 × 5种状态）`;
            setComponentDefinition('textfield');
            
            container.innerHTML = '';

            const types = [
                { key: 'A', label: '单行无标题', tfType: 'single_no_title' },
                { key: 'B', label: '单行有标题', tfType: 'single_with_title' },
                { key: 'C', label: '电话号码', tfType: 'phone' },
                { key: 'D', label: '多行文本', tfType: 'multiline' }
            ];
            const states = [
                { key: '1', label: '默认', state: 'default' },
                { key: '2', label: '激活', state: 'focused' },
                { key: '3', label: '输入', state: 'typing' },
                { key: '4', label: '完成', state: 'completed' },
                { key: '5', label: '错误', state: 'error' }
            ];

            // 设置全局分段选择栏
            const globalSegWrap = document.getElementById('globalSegBarWrap');
            const globalSegBar = document.getElementById('globalSegBar');
            globalSegWrap.style.display = '';
            globalSegBar.innerHTML = '';
            states.forEach((s, i) => {
                if (i > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'state-segment-divider';
                    divider.dataset.divider = String(i);
                    globalSegBar.appendChild(divider);
                }
                const tab = document.createElement('div');
                tab.className = 'state-segment-tab' + (i === 0 ? ' active' : '');
                tab.textContent = s.label;
                tab.dataset.state = s.state;
                globalSegBar.appendChild(tab);
            });
            // 初始隐藏第一个tab旁的分隔线
            const firstDiv = globalSegBar.querySelector('.state-segment-divider');
            if (firstDiv) firstDiv.style.opacity = '0';

            const previewWraps = [];

            types.forEach(t => {
                const card = document.createElement('div');
                card.className = 'stateful-variant-card';

                // 左侧：编号 + 类型名称
                const left = document.createElement('div');
                left.className = 'stateful-variant-left';
                left.innerHTML = `<span class="variant-id">${t.key}</span><span class="variant-type-label">${t.label}</span>`;
                card.appendChild(left);

                // 右侧：仅预览，无分段选择
                const right = document.createElement('div');
                right.className = 'stateful-variant-right';

                const previewWrap = document.createElement('div');
                previewWrap.className = 'stateful-variant-preview';
                const defaultVariant = variants.find(v => v.tfType === t.tfType && v.state === 'default');
                if (defaultVariant) {
                    const preview = document.createElement('div');
                    preview.className = 'variant-preview';
                    preview.draggable = true;
                    preview.dataset.variant = JSON.stringify(defaultVariant);
                    preview.appendChild(createTextFieldPreview(defaultVariant));
                    preview.addEventListener('dragstart', handleDragStart);
                    previewWrap.appendChild(preview);
                }
                right.appendChild(previewWrap);
                card.appendChild(right);

                previewWraps.push({ previewWrap, tfType: t.tfType });
                container.appendChild(card);
            });

            // 全局分段标签点击事件
            globalSegBar.addEventListener('click', (e) => {
                const clickedTab = e.target.closest('.state-segment-tab');
                if (!clickedTab) return;
                globalSegBar.querySelectorAll('.state-segment-tab').forEach(st => st.classList.remove('active'));
                clickedTab.classList.add('active');
                // 管理分隔线显隐
                globalSegBar.querySelectorAll('.state-segment-divider').forEach(d => d.style.opacity = '1');
                const activeIdx = Array.from(globalSegBar.querySelectorAll('.state-segment-tab')).indexOf(clickedTab);
                globalSegBar.querySelectorAll('.state-segment-divider').forEach((d, di) => {
                    if (di === activeIdx - 1 || di === activeIdx) d.style.opacity = '0';
                });
                const newState = clickedTab.dataset.state;
                // 更新所有类型的预览
                previewWraps.forEach(({ previewWrap, tfType }) => {
                    const newVariant = variants.find(v => v.tfType === tfType && v.state === newState);
                    if (newVariant) {
                        previewWrap.innerHTML = '';
                        const preview = document.createElement('div');
                        preview.className = 'variant-preview';
                        preview.draggable = true;
                        preview.dataset.variant = JSON.stringify(newVariant);
                        preview.appendChild(createTextFieldPreview(newVariant));
                        preview.addEventListener('dragstart', handleDragStart);
                        previewWrap.appendChild(preview);
                    }
                });
            });
        }

        // ========== 结构化 JSON Schema 导出 ==========
        function extractVariantProps(variant) {
            // 清理变体数据，去除 asset 路径等渲染细节，只保留语义化 props
            const clean = { id: variant.id, type: variant.type };
            
            if (variant.type === 'navbar') {
                clean.left = { slot: variant.L.id, name: variant.L.name };
                if (variant.L.text) clean.left.text = variant.L.text;
                if (variant.L.nameText) clean.left.profileName = variant.L.nameText;
                if (variant.L.badge) clean.left.badge = variant.L.badge;
                
                clean.center = { slot: variant.C.id, name: variant.C.name || 'Empty' };
                if (variant.C.title) clean.center.title = variant.C.title;
                if (variant.C.subtitle) clean.center.subtitle = variant.C.subtitle;
                if (variant.C.tabs) clean.center.tabs = variant.C.tabs;
                
                clean.right = { slot: variant.R.id, name: variant.R.name || 'Empty' };
                if (variant.R.text) clean.right.text = variant.R.text;
                if (variant.R.btn) clean.right.buttonText = variant.R.btn;
                if (variant.R.checkbox) clean.right.checkbox = true;
                
            } else if (variant.type === 'list') {
                clean.left = { slot: variant.L.id, name: variant.L.name };
                clean.center = { slot: variant.C.id, name: variant.C.name, lines: variant.C.lines };
                clean.right = { slot: variant.R.id, name: variant.R.name || 'Empty' };
                
            } else if (variant.type === 'form') {
                clean.left = { slot: variant.L.id, name: variant.L.name };
                if (variant.L.title) clean.left.title = variant.L.title;
                if (variant.L.subtitle) clean.left.subtitle = variant.L.subtitle;
                clean.right = { slot: variant.R.id, name: variant.R.name || 'Empty' };
                if (variant.R.text) clean.right.text = variant.R.text;
                
            } else if (variant.type === 'form_combo') {
                clean.name = variant.name;
                if (variant.header) clean.header = variant.header;
                clean.itemCount = variant.items || 0;
                if (variant.footer) clean.footer = variant.footer;
            } else if (variant.type === 'image_block') {
                clean.group = variant.group;
                clean.style = variant.style;
                clean.mode = variant.mode;
                clean.totalHeight = variant.totalHeight;
                if (variant.imgHeight) clean.imgHeight = variant.imgHeight;
                if (variant.cells) clean.cellCount = variant.cells.length;
            } else if (variant.type === 'data_filter') {
                clean.subType = variant.subType;
                clean.containerHeight = variant.containerHeight;
                if (variant.tabCount) clean.tabCount = variant.tabCount;
                if (variant.optionCount) clean.optionCount = variant.optionCount;
                if (variant.btnCount) clean.btnCount = variant.btnCount;
                if (variant.tagCount) clean.tagCount = variant.tagCount;
                if (variant.levelCount) clean.levelCount = variant.levelCount;
                if (variant.mode) clean.mode = variant.mode;
                if (variant.displayCount) clean.displayCount = variant.displayCount;
            } else if (variant.type === 'card') {
                clean.cardType = variant.cardType;
                clean.totalHeight = variant.totalHeight;
            } else if (variant.type === 'text_block') {
                clean.textType = variant.textType;
                clean.containerHeight = variant.containerHeight;
                clean.textAlign = variant.textAlign;
                if (variant.icon) clean.hasIcon = true;
                if (variant.iconAlign) clean.iconAlign = variant.iconAlign;
            } else if (variant.type === 'dialog') {
                clean.hasTitle = variant.hasTitle;
                clean.hasCheck = variant.hasCheck;
                clean.actionType = variant.actionType;
                clean.buttons = variant.buttons.map(b => ({ text: b.text, style: b.style }));
            } else if (variant.type === 'menu') {
                clean.hasIcon = variant.hasIcon;
                clean.optionCount = variant.optionCount;
                clean.options = variant.options.map(o => ({ text: o.text }));
            }
            
            return clean;
        }

        function extractEditedTexts(wrapper) {
            // 提取用户双击编辑过的文本
            const edited = {};
            const editables = wrapper.querySelectorAll('.editable-text');
            editables.forEach((el, i) => {
                const text = el.textContent.trim();
                if (text) edited[`text_${i}`] = text;
            });
            // 同时提取所有可见文本节点的关键内容
            const title = wrapper.querySelector('.title, .nav-title');
            const subtitle = wrapper.querySelector('.subtitle, .nav-subtitle');
            if (title) edited.title = title.textContent.trim();
            if (subtitle) edited.subtitle = subtitle.textContent.trim();
            return Object.keys(edited).length > 0 ? edited : undefined;
        }

        function extractComponentTree() {
            const frames = document.querySelectorAll('.phone-frame');
            const connectionNodes = document.querySelectorAll('.connection-node');
            
            // 收集提示词
            const hints = [];
            connectionNodes.forEach(node => {
                const input = node.querySelector('.connection-input');
                hints.push(input ? input.value.trim() : '');
            });
            
            const pages = [];
            
            frames.forEach((frame, index) => {
                const frameBg = frame.style.backgroundColor || '#FFFFFF';
                const page = {
                    id: `page_${index + 1}`,
                    index: index,
                    backgroundColor: rgbToHex(frameBg),
                    components: []
                };
                
                // 提取固定导航栏
                const navbarFixed = frame.querySelector('.phone-navbar-fixed');
                if (navbarFixed) {
                    const navbarWrappers = navbarFixed.querySelectorAll('.canvas-component');
                    navbarWrappers.forEach(wrapper => {
                        try {
                            const variant = JSON.parse(wrapper.dataset.variantJson);
                            const comp = extractVariantProps(variant);
                            comp.fixed = true;
                            comp.editedTexts = extractEditedTexts(wrapper);
                            page.components.push(comp);
                        } catch(e) {}
                    });
                }
                
                // 提取滚动区域组件
                const dropZone = frame.querySelector('.drop-zone:not(.nested-drop-zone)');
                if (dropZone) {
                    const wrappers = dropZone.querySelectorAll(':scope > .canvas-component');
                    wrappers.forEach(wrapper => {
                        try {
                            const variant = JSON.parse(wrapper.dataset.variantJson);
                            const comp = extractVariantProps(variant);
                            comp.editedTexts = extractEditedTexts(wrapper);
                            
                            // 如果是 form_combo，提取嵌套子项
                            if (variant.type === 'form_combo') {
                                const nestedZone = wrapper.querySelector('.nested-drop-zone');
                                if (nestedZone) {
                                    comp.children = [];
                                    const childWrappers = nestedZone.querySelectorAll(':scope > .canvas-component');
                                    childWrappers.forEach(child => {
                                        try {
                                            const childVariant = JSON.parse(child.dataset.variantJson);
                                            const childComp = extractVariantProps(childVariant);
                                            childComp.editedTexts = extractEditedTexts(child);
                                            comp.children.push(childComp);
                                        } catch(e) {}
                                    });
                                }
                            }
                            
                            page.components.push(comp);
                        } catch(e) {}
                    });
                }

                // 提取模态覆盖层组件
                const modalOverlay = frame.querySelector('.modal-overlay');
                if (modalOverlay) {
                    const modalWrappers = modalOverlay.querySelectorAll('.modal-content-area > .canvas-component');
                    modalWrappers.forEach(wrapper => {
                        try {
                            const variant = JSON.parse(wrapper.dataset.variantJson);
                            const comp = extractVariantProps(variant);
                            comp.modal = true;
                            comp.editedTexts = extractEditedTexts(wrapper);
                            page.components.push(comp);
                        } catch(e) {}
                    });
                }
                
                // 添加跳转提示词
                if (index < hints.length && hints[index]) {
                    page.transition = {
                        prompt: hints[index],
                        targetPage: `page_${index + 2}`
                    };
                }
                
                pages.push(page);
            });
            
            return {
                $schema: 'codebuddy-component-builder/1.0',
                exportedAt: new Date().toISOString(),
                designSystem: {
                    parentComponents: ['NavBar', 'List', 'Form'],
                    slotModel: 'L (Left) + C (Center) + R (Right)'
                },
                pages: pages,
                flow: hints.filter(h => h).length > 0 ? {
                    totalPages: pages.length,
                    transitions: hints.map((h, i) => h ? {
                        from: `page_${i + 1}`,
                        to: `page_${i + 2}`,
                        prompt: h
                    } : null).filter(Boolean)
                } : undefined
            };
        }

            contextMenuTargetFrame = frame;

            // 获取当前 frame 的背景色
            const currentColor = frame.style.backgroundColor || '#FFFFFF';
            // 转换 rgb 为 hex 以便比较
            const currentHex = rgbToHex(currentColor);

            let html = '<div class="ctx-label">背景色</div>';
            BG_COLOR_OPTIONS.forEach(opt => {
                const isActive = currentHex.toUpperCase() === opt.color.toUpperCase();
                html += `
                    <div class="ctx-option" data-color="${opt.color}">
                        <div class="ctx-color-dot" style="background: ${opt.color};"></div>
                        <span style="flex: 1;">${opt.name}</span>
                        <span class="ctx-check">${isActive ? '✓' : ''}</span>
                    </div>
                `;
            });
            frameContextMenu.innerHTML = html;

            // 定位菜单
            const menuWidth = 180;
            const menuHeight = 140;
            let x = e.clientX;
            let y = e.clientY;
            if (x + menuWidth > window.innerWidth) x = window.innerWidth - menuWidth - 8;
            if (y + menuHeight > window.innerHeight) y = window.innerHeight - menuHeight - 8;
            frameContextMenu.style.left = x + 'px';
            frameContextMenu.style.top = y + 'px';
            frameContextMenu.classList.add('show');

            // 绑定选项点击
            frameContextMenu.querySelectorAll('.ctx-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const color = opt.dataset.color;
                    if (contextMenuTargetFrame) {
                        setFrameBackgroundColor(contextMenuTargetFrame, color);
                    }
                    frameContextMenu.classList.remove('show');
                });
            });
        }

        function rgbToHex(color) {
            if (!color) return '#FFFFFF';
            if (color.startsWith('#')) return color;
            const match = color.match(/\d+/g);
            if (!match || match.length < 3) return '#FFFFFF';
            return '#' + match.slice(0, 3).map(n => parseInt(n).toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        // 初始 frame 绑定右键
        document.getElementById('frame-1').addEventListener('contextmenu', function(e) {
            showFrameContextMenu(e, this);
        });

        // 全局点击关闭菜单
        document.addEventListener('click', () => {
            frameContextMenu.classList.remove('show');
        });

        // 默认初始 frame 为白色
        setFrameBackgroundColor(document.getElementById('frame-1'), '#FFFFFF');

        // ========== AI 智能生成功能 ==========
        function openAiGenerateModal(triggerElement) {
            // 定位到触发元素所在的 frame
            const phoneFrame = triggerElement.closest('.phone-frame');
            if (!phoneFrame) return;
            
            // 移除已有弹窗
            const existing = document.getElementById('aiGenerateModal');
            if (existing) existing.remove();
            
            const modal = document.createElement('div');
            modal.id = 'aiGenerateModal';
            modal.style.cssText = `
                position: fixed; inset: 0; z-index: 10000;
                background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
                display: flex; align-items: center; justify-content: center;
            `;
            
            modal.innerHTML = `
                <div style="
                    width: 520px; background: #FFFFFF;
                    border-radius: 16px; box-shadow: 0 24px 80px rgba(0,0,0,0.2);
                    display: flex; flex-direction: column; overflow: hidden;
                ">
                    <div style="
                        padding: 20px 24px 0; 
                        display: flex; flex-direction: column;
                    ">
                        <div>
                            <div style="font-size: 17px; font-weight: 600;">智能生成</div>
                            <div style="font-size: 12px; color: rgba(60,60,67,0.56); margin-top: 2px;">
                                描述你想要的页面，AI 将从变体矩阵中自动选取组件组合
                            </div>
                        </div>
                    </div>
                    <div style="padding: 16px 24px;">
                        <textarea id="aiPromptInput" placeholder="例如：一个包含返回按钮和标题的导航栏，下方是3条带头像的联系人列表，每条有名称和描述信息" style="
                            width: 100%; height: 140px; border: 1px solid rgba(0,0,0,0.1);
                            border-radius: 12px; padding: 14px 16px; font-size: 14px;
                            font-family: inherit; line-height: 1.6; color: var(--text-primary);
                            outline: none; resize: none; background: #FAFAFA;
                            transition: border-color 0.2s, box-shadow 0.2s;
                        "></textarea>
                    </div>
                    <div style="
                        padding: 16px 24px; border-top: 1px solid rgba(0,0,0,0.06);
                        display: flex; gap: 12px; justify-content: flex-end;
                    ">
                        <button id="aiCancelBtn" style="
                            padding: 8px 20px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1);
                            background: white; font-size: 14px; cursor: pointer;
                            font-family: inherit; color: #1D1D1F;
                        ">取消</button>
                        <button id="aiConfirmBtn" style="
                            padding: 8px 24px; border-radius: 8px; border: none;
                            background: #0099FF; color: white; font-size: 14px;
                            cursor: pointer; font-family: inherit; font-weight: 500;
                            transition: opacity 0.2s;
                        ">生成</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 聚焦输入框
            const input = document.getElementById('aiPromptInput');
            setTimeout(() => input.focus(), 100);
            
            // 输入框聚焦样式
            input.addEventListener('focus', () => {
                input.style.borderColor = 'var(--brand-blue)';
                input.style.boxShadow = '0 0 0 3px rgba(0, 153, 255, 0.12)';
            });
            input.addEventListener('blur', () => {
                input.style.borderColor = 'rgba(0,0,0,0.1)';
                input.style.boxShadow = 'none';
            });
            
            // 关闭
            document.getElementById('aiCancelBtn').onclick = () => modal.remove();
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
            
            // Enter 键确认（Shift+Enter 换行）
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('aiConfirmBtn').click();
                }
            });
            
            // 确认生成
            document.getElementById('aiConfirmBtn').onclick = () => {
                const prompt = input.value.trim();
                if (!prompt) {
                    input.style.borderColor = '#FF3B30';
                    input.style.boxShadow = '0 0 0 3px rgba(255,59,48,0.12)';
                    input.setAttribute('placeholder', '请输入页面描述…');
                    setTimeout(() => {
                        input.style.borderColor = 'rgba(0,0,0,0.1)';
                        input.style.boxShadow = 'none';
                    }, 1500);
                    return;
                }
                
                // 执行AI生成
                aiGenerateComponents(prompt, phoneFrame);
                modal.remove();
            };
        }

        // ========== AI 解析引擎：从提示词自动选取组件 ==========
        function aiGenerateComponents(prompt, phoneFrame) {
            const dropZone = phoneFrame.querySelector('.drop-zone:not(.nested-drop-zone)');
            const navbarFixed = phoneFrame.querySelector('.phone-navbar-fixed');
            if (!dropZone) return;
            
            // 清空当前内容
            dropZone.innerHTML = '';
            dropZone.classList.remove('empty');
            if (navbarFixed) navbarFixed.innerHTML = '';
            
            // 解析提示词，生成组件列表
            const components = parsePromptToComponents(prompt);
            
            // 逐个添加组件（带动画效果）
            let delay = 0;
            components.forEach((comp, index) => {
                setTimeout(() => {
                    const wrapper = createComponentWrapper(comp.variant);
                    
                    // 如果有自定义文本，替换
                    if (comp.texts) {
                        applyCustomTexts(wrapper, comp.texts);
                    }
                    
                    // navbar 放入固定区域
                    if (comp.variant.type === 'navbar' && navbarFixed) {
                        navbarFixed.innerHTML = '';
                        navbarFixed.appendChild(wrapper);
                    } else {
                        wrapper.style.opacity = '0';
                        wrapper.style.transform = 'translateY(8px)';
                        dropZone.appendChild(wrapper);
                        
                        // 淡入动画
                        requestAnimationFrame(() => {
                            wrapper.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                            wrapper.style.opacity = '1';
                            wrapper.style.transform = 'translateY(0)';
                        });
                    }
                }, delay);
                delay += 80;
            });
            
            // 显示提示
            setTimeout(() => {
                showToast(`已生成 ${components.length} 个组件`);
            }, delay + 100);
        }

        function applyCustomTexts(wrapper, texts) {
            if (texts.title) {
                const titleEl = wrapper.querySelector('.title, .nav-title');
                if (titleEl) titleEl.textContent = texts.title;
            }
            if (texts.subtitle) {
                const subtitleEl = wrapper.querySelector('.subtitle, .nav-subtitle, .desc');
                if (subtitleEl) subtitleEl.textContent = texts.subtitle;
            }
            if (texts.helperText) {
                const helperEl = wrapper.querySelector('.helper-text');
                if (helperEl) helperEl.textContent = texts.helperText;
            }
            if (texts.buttonText) {
                const btnEl = wrapper.querySelector('.nav-btn, .btn-secondary');
                if (btnEl) btnEl.textContent = texts.buttonText;
            }
        }

        // 核心解析函数：将自然语言映射到组件变体
        function parsePromptToComponents(prompt) {
            const p = prompt.toLowerCase();
            const components = [];
            
            // ===== 1. 解析导航栏 =====
            const navbarMatch = parseNavbar(p, prompt);
            if (navbarMatch) components.push(navbarMatch);
            
            // ===== 2. 解析页面主体内容 =====
            const bodyComponents = parseBody(p, prompt);
            components.push(...bodyComponents);
            
            // 如果什么都没匹配到，给出默认的基础组件
            if (components.length === 0) {
                components.push({
                    variant: findVariant('navbar', 'L1', 'C1', 'R0/Empty'),
                    texts: { title: '标题' }
                });
                components.push({
                    variant: findVariant('list', 'L1', 'C1', 'R1'),
                    texts: { title: '列表项' }
                });
            }
            
            return components;
        }

        function parseNavbar(p, raw) {
            // 检测是否有导航栏相关关键词
            const hasNavbar = /导航栏|navbar|顶部栏|标题栏|头部|nav/.test(p);
            if (!hasNavbar) return null;
            
            // 解析 Left
            let navL = 'L1'; // 默认返回按钮
            if (/关闭|close/.test(p)) navL = 'L3';
            else if (/头像.*用户|用户.*头像|profile|个人/.test(p) && /导航/.test(p)) navL = 'L6';
            else if (/返回.*气泡|badge|未读/.test(p)) navL = 'L2';
            else if (/返回|back|←/.test(p)) navL = 'L1';
            
            // 解析 Center
            let navC = 'C1'; // 默认标题
            let navTitle = '标题';
            if (/分段|tab|选项卡|segment/.test(p)) {
                navC = 'C5';
            } else if (/副标题|subtitle/.test(p)) {
                navC = 'C3';
            }
            
            // 从原始提示词中提取标题文本
            const titleMatch = raw.match(/标题[""「]([^""」]+)[""」]|标题[为是]?[：:]?\s*[""]?([^\s""，,。]+)/);
            if (titleMatch) navTitle = titleMatch[1] || titleMatch[2];
            else {
                // 尝试匹配引号中的文字作为标题
                const quotedMatch = raw.match(/["「]([^"」]{1,10})["」]/);
                if (quotedMatch) navTitle = quotedMatch[1];
            }
            
            // 解析 Right
            let navR = 'R0/Empty';
            let navBtnText = '';
            if (/确认|确定|保存|完成|发送/.test(p) && /按钮|btn/.test(p)) {
                navR = 'R4';
                const btnMatch = p.match(/(确认|确定|保存|完成|发送)/);
                navBtnText = btnMatch ? btnMatch[1] : '确认';
            } else if (/搜索.*图标|图标.*搜索|search/.test(p) && /双图标|两个图标/.test(p)) {
                navR = 'R2';
            } else if (/图标|icon|搜索|search|更多|more/.test(p)) {
                navR = 'R1';
            } else if (/操作|action|编辑|edit/.test(p)) {
                navR = 'R3';
            } else if (/确认|确定|保存|完成|发送|提交/.test(p)) {
                navR = 'R4';
                const btnMatch = p.match(/(确认|确定|保存|完成|发送|提交)/);
                navBtnText = btnMatch ? btnMatch[1] : '确认';
            }
            
            // 处理 L6 的约束：L6 只能与 C0/Empty + R1/R2
            if (navL === 'L6') {
                navC = 'C0/Empty';
                if (!['R1', 'R2'].includes(navR)) navR = 'R1';
            }
            
            // 处理 C5 的约束
            if (navC === 'C5') {
                if (!['L1', 'L3'].includes(navL)) navL = 'L1';
                if (!['R1', 'R0/Empty'].includes(navR)) navR = 'R0/Empty';
            }
            
            const variant = findVariant('navbar', navL, navC, navR);
            if (!variant) return null;
            
            const result = { variant, texts: {} };
            if (navTitle && navC !== 'C0/Empty' && navC !== 'C5') result.texts.title = navTitle;
            if (navBtnText && (navR === 'R4' || navR === 'R5')) result.texts.buttonText = navBtnText;
            
            return result;
        }

        function parseBody(p, raw) {
            const components = [];
            
            // 解析列表类内容
            const listPatterns = [
                { regex: /聊天列表|聊天记录|消息列表|chat/,  L: 'L5', C: 'C2', R: 'R9', title: '联系人', count: 5 },
                { regex: /联系人|好友列表|通讯录|contact/,    L: 'L4', C: 'C2', R: 'R1', title: '联系人名称', count: 4 },
                { regex: /文件列表|文件管理|file/,            L: 'L2', C: 'C2', R: 'R6', title: '文件名称', count: 3 },
                { regex: /步数|运动|exercise|step/,           L: 'L4', C: 'C2', R: 'R8', title: '好友', count: 3 },
                { regex: /金额|账单|交易|payment|bill/,       L: 'L4', C: 'C2', R: 'R7', title: '交易记录', count: 3 },
            ];
            
            let listMatched = false;
            for (const lp of listPatterns) {
                if (lp.regex.test(p)) {
                    const count = extractCount(p, lp.count);
                    for (let i = 0; i < count; i++) {
                        const variant = findVariant('list', lp.L, lp.C, lp.R);
                        if (variant) {
                            components.push({ variant, texts: { title: lp.title } });
                        }
                    }
                    listMatched = true;
                    break;
                }
            }
            
            // 通用列表匹配
            if (!listMatched && /列表|list|条目|item/.test(p)) {
                // 判断复杂度
                let listL = 'L1', listC = 'C1', listR = 'R1';
                
                if (/头像|avatar|大头像/.test(p)) {
                    if (/大|large|52/.test(p)) listL = 'L5';
                    else if (/中|medium|40/.test(p)) listL = 'L4';
                    else listL = 'L3';
                } else if (/图标|icon/.test(p)) {
                    listL = 'L1';
                } else if (/缩略图|thumbnail/.test(p)) {
                    listL = 'L6';
                }
                
                if (/双行|两行|描述|desc|副标题/.test(p)) listC = 'C2';
                else if (/三行|三行/.test(p)) listC = 'C3';
                
                if (/按钮|button|btn/.test(p)) listR = 'R4';
                else if (/开关|switch|toggle/.test(p)) listR = 'R1'; // list没有开关，用箭头代替
                else if (/箭头|arrow|跳转|详情/.test(p)) listR = 'R1';
                else if (/操作|action/.test(p)) listR = 'R5';
                
                // 验证 L 与 C 的兼容性
                const lOpt = LIST_L_OPTIONS.find(o => o.id === listL);
                const cOpt = LIST_C_OPTIONS.find(o => o.id === listC);
                if (lOpt && cOpt && lOpt.type !== 'any' && lOpt.type !== cOpt.type) {
                    listC = lOpt.type === 'single' ? 'C1' : 'C2';
                }
                
                const count = extractCount(p, 3);
                for (let i = 0; i < count; i++) {
                    const variant = findVariant('list', listL, listC, listR);
                    if (variant) {
                        components.push({ variant, texts: { title: '通栏式列表文本' } });
                    }
                }
            }
            
            // 解析卡片式列表类内容
            if (/卡片式列表|表单|form|grouped list|设置|setting|输入|input|填写/.test(p)) {
                const formItems = parseFormItems(p, raw);
                components.push(...formItems);
            }
            
            // 解析带分组的卡片式列表
            if (/分组|group|section/.test(p) && /卡片式列表|表单|form|设置/.test(p)) {
                // 已经在 parseFormItems 中处理了 form_combo
            }
            
            return components;
        }

        function parseFormItems(p, raw) {
            const items = [];
            
            // 检测是否需要分组
            const needGroup = /分组|group|section/.test(p);
            
            // 解析具体的表单项
            const formPatterns = [
                { regex: /开关|switch|toggle|通知/, L: 'L1', R: 'R4', title: '设置项' },
                { regex: /勾选|checkbox|选择/, L: 'L1', R: 'R5', title: '选项' },
                { regex: /下拉|dropdown|选择|分类/, L: 'L1', R: 'R2', title: '选择项' },
                { regex: /箭头|跳转|详情|arrow|navigate/, L: 'L1', R: 'R3', title: '设置项' },
                { regex: /图标.*标题|icon.*title/, L: 'L3', R: 'R3', title: '标题文本' },
                { regex: /头像|avatar/, L: 'L7', R: 'R5', title: '用户名称' },
            ];
            
            // 尝试从句子中拆分具体项
            const itemDescriptions = raw.split(/[，,、；;]/);
            let formItemsCount = 0;
            
            itemDescriptions.forEach(desc => {
                const d = desc.toLowerCase().trim();
                if (!d) return;
                
                // 跳过导航栏相关的描述
                if (/导航栏|navbar|顶部/.test(d)) return;
                
                let matched = false;
                for (const fp of formPatterns) {
                    if (fp.regex.test(d)) {
                        // 提取标题文本
                        let title = fp.title;
                        const nameMatch = desc.match(/[\u4e00-\u9fa5a-zA-Z]{2,8}(?=带|有|含|的)/);
                        if (nameMatch) title = nameMatch[0];
                        
                        const variant = findVariant('form', fp.L, null, fp.R);
                        if (variant) {
                            items.push({ variant, texts: { title } });
                            formItemsCount++;
                            matched = true;
                        }
                        break;
                    }
                }
                
                // 如果是表单上下文但没匹配到具体模式，用默认的箭头型
                if (!matched && /[\u4e00-\u9fa5]{2,}/.test(d) && formItemsCount < 6) {
                    // 从描述中提取可能的标题
                    const possibleTitle = d.replace(/带.*|有.*|含.*|的.*|输入|填写/g, '').trim();
                    if (possibleTitle.length >= 2 && possibleTitle.length <= 10 && !/表单|form|设置|分组|下方|上方/.test(possibleTitle)) {
                        const variant = findVariant('form', 'L1', null, 'R3');
                        if (variant) {
                            items.push({ variant, texts: { title: possibleTitle } });
                            formItemsCount++;
                        }
                    }
                }
            });
            
            // 如果没有解析出具体项，生成默认表单
            if (items.length === 0 && /表单|form|设置/.test(p)) {
                const count = extractCount(p, 3);
                for (let i = 0; i < count; i++) {
                    const variant = findVariant('form', 'L1', null, 'R3');
                    if (variant) {
                        items.push({ variant, texts: { title: '标题文本' } });
                    }
                }
            }
            
            return items;
        }

        function extractCount(prompt, defaultCount) {
            // 从提示词中提取数量
            const numMap = { '一': 1, '二': 2, '两': 2, '三': 3, '四': 4, '五': 5, '六': 6, '七': 7, '八': 8, '九': 9, '十': 10 };
            
            // 匹配 "3条" "5个" "三条" 等
            const match = prompt.match(/(\d+|[一二两三四五六七八九十])\s*[条个项行]/);
            if (match) {
                const num = parseInt(match[1]) || numMap[match[1]] || defaultCount;
                return Math.min(Math.max(num, 1), 10); // 限制1-10
            }
            
            // 匹配 "多条" "多个"
            if (/多[条个项行]/.test(prompt)) return Math.min(defaultCount + 2, 8);
            
            return defaultCount;
        }

        // 查找变体的辅助函数
        function findVariant(type, L, C, R) {
            if (type === 'navbar') {
                const variants = generateNavBarVariants();
                const found = variants.find(v => v.L.id === L && v.C.id === C && v.R.id === R);
                if (found) return found;
                // 降级：尝试不匹配 R
                const fallback = variants.find(v => v.L.id === L && v.C.id === C);
                return fallback || variants[0];
            } else if (type === 'list') {
                const variants = generateListVariants();
                const found = variants.find(v => v.L.id === L && v.C.id === C && v.R.id === R);
                if (found) return found;
                const fallback = variants.find(v => v.L.id === L && v.C.id === C);
                return fallback || variants[0];
            } else if (type === 'form') {
                const variants = generateFormVariants().filter(v => v.type === 'form');
                const found = variants.find(v => v.L.id === L && v.R.id === R);
                if (found) return found;
                const fallback = variants.find(v => v.L.id === L);
                return fallback || variants[0];
            } else if (type === 'action') {
                const variants = generateActionVariants();
                const found = variants.find(v => v.id === L);
                return found || variants[0];
            }
            return null;
        }

        // ========== 初始化 ==========
        renderParentComponents();
        // 默认选中第一个母组件，展开子组件列表
        selectParentComponent(PARENT_COMPONENTS[0].id);
    </script>
